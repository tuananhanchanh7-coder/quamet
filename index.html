    <script>
      // Fetch Guard: Prevents 'TypeError: Cannot set property fetch of #<Window> which has only a getter'
      // This happens when polyfills (like formdata-polyfill) try to overwrite native fetch in environments where it is read-only.
      (function() {
        var _fetch = window.fetch;
        if (_fetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return _fetch; },
              set: function() { console.warn('Blocked attempt to override native fetch.'); },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // If it's not configurable, we can't do much, but at least we tried.
          }
        }
      })();
    </script>
